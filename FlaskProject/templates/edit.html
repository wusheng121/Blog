{% extends 'base.html' %}

{% block content %}
<h1>{% block title %}编辑{% endblock %}</h1>

<form method="post">
    <div class="form-group">
        <label for="title">标题</label>
        <input type="text" name="title" placeholder="标题" class="form-control"
               value="{{ request.form['title'] or post['title'] }}">
    </div>

    <div class="form-group">
        <label for="content">内容</label>
        <textarea name="content" placeholder="文章内容" class="form-control">{{ request.form['content'] or post['content']}}</textarea>
    </div>

    <div class="form-group">
        <button type="submit" class="btn btn_primary">提交</button>
    </div>
</form>

{% endblock %}
