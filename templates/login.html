{% extends 'base.html' %}

{% block content %}
<h2>登录</h2>
<form method="POST">

    <div class="form-group">
        <label for="title">用户名</label>
        <input type="text" name="username" placeholder="用户名" class="form-control"
               value="{{ request.form['username'] }}">
    </div>
    <div class="form-group">
        <label for="title">密码</label>
        <input type="text" name="password" placeholder="密码" class="form-control"
               value="{{ request.form['password'] }}">
    </div>
{#    <div><input type="text" name="username" placeholder="用户名" required></div>#}
{#    <div><input type="text" name="password" placeholder="密码" required></div>#}
    <div><button type="submit">登录</button></div>
</form>
{% endblock %}
